<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter V4.1 | Stabilizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #010409; color: #cbd5e1; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.03); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .win { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
        .loss { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.2); }
        .status-wait { animation: pulse 2s infinite; color: #fbbf24; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-white/5 pb-8">
            <div>
                <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase">Hunter <span class="text-yellow-500">V4.1</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Stabilizer Logic • Anti-Streak Guard</p>
            </div>
            <div id="connBadge" class="px-5 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-[10px] font-black uppercase">Offline</div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-4 space-y-4">
                <div class="glass p-8 rounded-[2.5rem] space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase">Target ($)</label>
                            <input type="number" id="targetProfit" value="5.00" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm font-bold text-white outline-none">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase">Stop Loss ($)</label>
                            <input type="number" id="minBalance" value="50.00" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm font-bold text-white outline-none">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase">Base Stake</label>
                            <input type="number" id="stakeAwal" value="0.35" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm font-bold text-white outline-none">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-yellow-500 uppercase">Cool-down (s)</label>
                            <input type="number" id="cooldownSec" value="60" class="w-full bg-black/40 border border-yellow-500/30 rounded-2xl p-4 text-sm font-black text-white outline-none">
                        </div>
                    </div>

                    <div class="p-4 bg-yellow-500/5 border border-yellow-500/10 rounded-2xl">
                        <p class="text-[10px] text-yellow-500 font-bold mb-2 uppercase">Safety Advice</p>
                        <p class="text-[10px] text-slate-400 leading-relaxed">Lower your base stake to **$0.35** and target small 2-3% gains per session to avoid the Martingale trap.</p>
                    </div>

                    <button id="btnAction" onclick="toggleBot()" class="w-full bg-yellow-600 py-5 rounded-[1.5rem] font-black text-white text-[12px] uppercase tracking-widest transition-all hover:bg-yellow-500">Engage Stabilizer</button>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8 space-y-6">
                <div class="grid grid-cols-4 gap-4">
                    <div class="glass p-6 rounded-[2rem] border-l-2 border-yellow-500">
                        <p class="text-[9px] font-black text-slate-500 uppercase">Status</p>
                        <p id="statStatus" class="text-sm font-black mono text-white truncate">Standby</p>
                    </div>
                    <div class="glass p-6 rounded-[2rem]">
                        <p class="text-[9px] font-black text-slate-500 uppercase">Session</p>
                        <p id="statProfit" class="text-xl font-black mono text-white">$0.00</p>
                    </div>
                    <div class="glass p-6 rounded-[2rem]">
                        <p class="text-[9px] font-black text-slate-500 uppercase">Safety Gate</p>
                        <p id="statProb" class="text-xl font-black mono text-blue-400">0.0%</p>
                    </div>
                    <div class="glass p-6 rounded-[2rem]">
                        <p class="text-[9px] font-black text-slate-500 uppercase">Next</p>
                        <p id="statNextStake" class="text-xl font-black mono text-white">$0.00</p>
                    </div>
                </div>

                <div class="glass rounded-[2.5rem] overflow-hidden flex flex-col h-[400px]">
                    <div id="log" class="p-8 flex-1 overflow-y-auto text-[11px] mono space-y-2 no-scrollbar scroll-smooth">
                        <div class="text-slate-500 uppercase text-[9px] font-bold tracking-widest mb-4">System Shield Active</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <select id="activeAccount" class="hidden"></select>

    <script>
        const APP_ID = '1089';
        let ws, isRunning = false, isBuying = false, isWaiting = false;
        let accounts = JSON.parse(localStorage.getItem('hunter_accounts') || '[]');
        let totalProfit = 0, currentStake = 0, tickHistory = [], userBalance = 0;

        // Auto-select first account for stability if available
        window.onload = () => { if(accounts.length > 0) document.getElementById('activeAccount').innerHTML = `<option value="0">${accounts[0].name}</option>`; };

        function toggleBot() {
            if (isRunning) return stopBot();
            if (accounts.length === 0) return alert("Please add an API token first.");
            
            currentStake = parseFloat(document.getElementById('stakeAwal').value);
            totalProfit = 0;
            isWaiting = false;
            initWebSocket(accounts[0].token);
        }

        function initWebSocket(token) {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
            ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.msg_type === 'authorize') {
                    ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                    ws.send(JSON.stringify({ ticks_history: "1HZ100V", end: "latest", count: 100, subscribe: 1 }));
                    startBot();
                }
                if (data.msg_type === 'balance') {
                    userBalance = data.balance.balance;
                    document.getElementById('statNextStake').innerText = `$${currentStake.toFixed(2)}`;
                    checkSafety();
                }
                if (data.msg_type === 'history') tickHistory = data.history.prices.map(p => parseInt(p.toString().slice(-1)));
                if (data.msg_type === 'tick') {
                    tickHistory.push(parseInt(data.tick.quote.toString().slice(-1)));
                    if(tickHistory.length > 100) tickHistory.shift();
                    analyze();
                }
                if (data.msg_type === 'buy') {
                    ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
                }
                if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                    processResult(data.proposal_open_contract);
                }
            };
        }

        function analyze() {
            if (!isRunning || isBuying || isWaiting || tickHistory.length < 50) return;

            const counts = Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            
            let least = 0, min = 101;
            counts.forEach((c, i) => { if(c < min) { min = c; least = i; } });

            const prob = (min / tickHistory.length) * 100;
            document.getElementById('statProb').innerText = prob.toFixed(1) + "%";

            // Safety Logic: Only enter if the digit hasn't appeared in the last 5 ticks
            const recentTicks = tickHistory.slice(-5);
            const isTrending = recentTicks.includes(least);

            if (prob <= 8 && !isTrending) {
                sendTrade(least);
            } else {
                document.getElementById('statStatus').innerText = "Scanning Pattern...";
                document.getElementById('statStatus').className = "text-sm font-black mono text-blue-400";
            }
        }

        function sendTrade(target) {
            isBuying = true;
            document.getElementById('statStatus').innerText = "Executing Differ " + target;
            ws.send(JSON.stringify({
                "buy": 1, "price": parseFloat(currentStake.toFixed(2)),
                "parameters": { 
                    "amount": parseFloat(currentStake.toFixed(2)), "basis": "stake", 
                    "contract_type": "DIGITDIFF", "currency": "USD", 
                    "duration": 1, "duration_unit": "t", 
                    "symbol": "1HZ100V", "barrier": target.toString() 
                }
            }));
        }

        function processResult(c) {
            const p = parseFloat(c.profit);
            totalProfit += p;
            
            if (p > 0) {
                currentStake = parseFloat(document.getElementById('stakeAwal').value);
                log(`WIN: +$${p.toFixed(2)}`, 'win');
                isBuying = false;
            } else {
                log(`LOSS DETECTED. Activating Shield.`, 'loss');
                activateCooldown();
                currentStake = parseFloat((currentStake * 11).toFixed(2));
            }
            updateUI();
        }

        function activateCooldown() {
            isWaiting = true;
            isBuying = false;
            let timer = parseInt(document.getElementById('cooldownSec').value);
            const interval = setInterval(() => {
                document.getElementById('statStatus').innerText = `Cooldown: ${timer}s`;
                document.getElementById('statStatus').className = "text-sm font-black mono status-wait";
                timer--;
                if (timer < 0) {
                    clearInterval(interval);
                    isWaiting = false;
                    log("Shield Deactivated. Resuming.", "info");
                }
            }, 1000);
        }

        function checkSafety() {
            if (totalProfit >= parseFloat(document.getElementById('targetProfit').value)) {
                log("TARGET HIT. Stopping to protect profit.", "win");
                stopBot();
            }
        }

        function log(m, t) {
            const entry = `<div class="${t}">[${new Date().toLocaleTimeString()}] ${m}</div>`;
            document.getElementById('log').insertAdjacentHTML('afterbegin', entry);
        }

        function updateUI() {
            const pEl = document.getElementById('statProfit');
            pEl.innerText = `$${totalProfit.toFixed(2)}`;
            pEl.className = `text-xl font-black mono ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
        }

        function startBot() {
            isRunning = true;
            document.getElementById('btnAction').innerText = "HALT SYSTEM";
            document.getElementById('btnAction').classList.replace('bg-yellow-600', 'bg-red-600');
            document.getElementById('connBadge').innerText = "Shield On";
            document.getElementById('connBadge').className = "px-5 py-3 rounded-xl bg-green-500/10 border border-green-500/20 text-green-500 text-[10px] font-black uppercase";
        }

        function stopBot() {
            isRunning = false; isBuying = false; isWaiting = false;
            if(ws) ws.close();
            document.getElementById('btnAction').innerText = "ENGAGE STABILIZER";
            document.getElementById('btnAction').classList.replace('bg-red-600', 'bg-yellow-600');
            document.getElementById('connBadge').innerText = "Offline";
            document.getElementById('connBadge').className = "px-5 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-[10px] font-black uppercase";
        }
    </script>
</body>
</html>
