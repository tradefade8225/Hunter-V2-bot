<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUNTER V2 | PRO TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #020202; color: #cbd5e1; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* DROPDOWN FIX: Ensures text is visible on all devices */
        select { background-color: #0f172a !important; color: white !important; appearance: none; -webkit-appearance: none; }
        select option { background: #0f172a; color: white; }
        
        .win { color: #22c55e; font-weight: 800; }
        .loss { color: #ef4444; font-weight: 800; }
        .info { color: #3b82f6; }

        @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .loading-bar { position: relative; overflow: hidden; }
        .loading-bar::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent); animation: sweep 2s infinite; }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-4xl mx-auto space-y-4">
        
        <div class="glass p-5 rounded-[2rem] flex justify-between items-center border-b-2 border-blue-500/20">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">HUNTER <span class="text-blue-500 not-italic">V2</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                    <span id="statusText" class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Disconnected</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select id="activeAccount" onchange="loadSelectedAccount()" class="text-[10px] font-black p-3 rounded-xl border border-white/10 outline-none min-w-[120px]">
                    <option value="">SELECT PROFILE</option>
                </select>
                <button onclick="openAccountModal()" class="w-10 h-10 rounded-xl bg-blue-600/10 text-blue-500 font-bold">+</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="glass p-4 rounded-3xl text-center border-b border-white/5">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Profit/Loss</p>
                <h2 id="statProfit" class="text-xl font-black mono text-white">$0.00</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center border-b border-white/5">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Live Balance</p>
                <h2 id="statBalance" class="text-xl font-black mono text-white truncate">$0.00</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center border-b border-white/5">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Streak</p>
                <h2 id="statStreak" class="text-xl font-black mono text-orange-500">0</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center border-b border-white/5">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Next Trade</p>
                <h2 id="statNextStake" class="text-xl font-black mono text-blue-400">$1.50</h2>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-500 ml-1 uppercase">Volatility Market</label>
                    <select id="marketSelect" class="w-full p-4 rounded-2xl text-sm font-bold border border-white/5 outline-none">
                        <option value="R_10">Volatility 10 Index</option>
                        <option value="R_25">Volatility 25 Index</option>
                        <option value="R_50">Volatility 50 Index</option>
                        <option value="R_100">Volatility 100 Index</option>
                        <option value="1HZ10V">Volatility 10 (1s)</option>
                        <option value="1HZ100V">Volatility 100 (1s)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-1 uppercase">Stake ($)</label>
                        <input type="number" id="stakeAwal" value="1.50" class="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl text-white font-bold outline-none focus:ring-1 ring-blue-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-1 uppercase">Predict (0-9)</label>
                        <input type="number" id="predDigit" value="5" class="w-full p-4 bg-slate-900 border border-white/5 rounded-2xl text-white font-bold outline-none focus:ring-1 ring-blue-500">
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-3 pt-2">
                <button id="btnAction" onclick="toggleBot()" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-blue-900/20">Start Engine</button>
                <button onclick="manualReset()" class="flex-1 bg-white/5 hover:bg-white/10 text-slate-400 p-5 rounded-2xl font-black text-[9px] uppercase tracking-widest transition-all">Reset Stake</button>
            </div>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden flex flex-col h-64">
            <div class="px-6 py-3 bg-white/5 border-b border-white/5 text-[8px] font-black uppercase text-slate-500 tracking-widest flex justify-between items-center">
                Live Logic Console <div id="loader" class="hidden w-16 h-1 rounded-full loading-bar"></div>
            </div>
            <div id="log" class="p-5 flex-1 overflow-y-auto font-mono text-[10px] space-y-1 scroll-smooth">
                <div class="text-slate-600">> Hardware Ready. Select profile to initialize.</div>
            </div>
        </div>
    </div>

    <div id="accountModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm border border-white/10">
            <h3 class="text-xl font-black text-white mb-6 uppercase tracking-tight">Add Profile</h3>
            <div class="space-y-4">
                <input type="text" id="newAccName" placeholder="Profile Label" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none text-white font-bold">
                <input type="password" id="newAccToken" placeholder="Deriv API Token" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none text-white font-bold">
                <div class="flex gap-2 pt-4">
                    <button onclick="saveNewAccount()" class="flex-1 bg-blue-600 py-4 rounded-xl font-black text-white text-[10px] uppercase">Save</button>
                    <button onclick="closeAccountModal()" class="flex-1 bg-white/5 py-4 rounded-xl font-black text-slate-500 text-[10px] uppercase">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const APP_ID = '1089';
        let ws, isRunning = false;
        let accounts = JSON.parse(localStorage.getItem('hunter_accounts') || '[]');
        let totalProfit = 0, lossCount = 0, currentStake = 0, accountBalance = 0;

        window.onload = () => { renderAccountList(); };

        function renderAccountList() {
            const select = document.getElementById('activeAccount');
            select.innerHTML = '<option value="">SELECT PROFILE</option>';
            accounts.forEach((acc, i) => { select.innerHTML += `<option value="${i}">${acc.name.toUpperCase()}</option>`; });
        }

        function loadSelectedAccount() {
            const v = document.getElementById('activeAccount').value;
            if(v) { log(`Profile Loaded: ${accounts[v].name}`, 'info'); }
        }

        function toggleBot() {
            if (isRunning) return stopBot();
            const idx = document.getElementById('activeAccount').value;
            if (!idx) return alert("Select an account profile first.");
            currentStake = parseFloat(document.getElementById('stakeAwal').value);
            initWebSocket(accounts[idx].token);
        }

        function initWebSocket(token) {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
            ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));

            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.error) { log(`API Error: ${data.error.message}`, 'loss'); stopBot(); return; }
                
                // STEP 1: Authorization
                if (data.msg_type === 'authorize') {
                    ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                    isRunning = true;
                    updateBtn(true);
                    log("Connected & Authorized. Starting loop...", 'info');
                    sendProposal(); 
                }
                
                if (data.msg_type === 'balance') { accountBalance = data.balance.balance; updateUI(); }

                // STEP 2: Receive Proposal ID
                if (data.msg_type === 'proposal') {
                    log(`Proposal Active. Executing Buy...`);
                    ws.send(JSON.stringify({ buy: data.proposal.id, price: currentStake }));
                }

                // STEP 3: Handle Purchase
                if (data.msg_type === 'buy') {
                    log(`Contract Live. ID: ${data.buy.contract_id}`, 'info');
                    ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
                }

                // STEP 4: Process Result
                if (data.msg_type === 'proposal_open_contract') {
                    const contract = data.proposal_open_contract;
                    if (contract.is_sold) {
                        ws.send(JSON.stringify({ forget: contract.subscription_id }));
                        processResult(contract);
                    }
                }
            };
        }

        function sendProposal() {
            if (!isRunning) return;
            const market = document.getElementById('marketSelect').value;
            const pred = document.getElementById('predDigit').value;
            ws.send(JSON.stringify({
                proposal: 1, amount: currentStake, basis: 'stake',
                contract_type: 'DIGITDIFF', currency: 'USD', duration: 1,
                duration_unit: 't', symbol: market, barrier: pred.toString()
            }));
        }

        function processResult(c) {
            const p = parseFloat(c.profit);
            totalProfit += p;
            if (p > 0) {
                lossCount = 0;
                currentStake = parseFloat(document.getElementById('stakeAwal').value);
                log(`WIN! +$${p.toFixed(2)}`, 'win');
            } else {
                lossCount++;
                currentStake = currentStake * 11;
                log(`LOSS! -$${Math.abs(p).toFixed(2)}`, 'loss');
            }
            updateUI();
            setTimeout(sendProposal, 3500); // Wait 3.5s for next trade
        }

        function stopBot() { isRunning = false; if(ws) ws.close(); updateBtn(false); log("Engine Shutdown.", 'info'); }
        
        function manualReset() { 
            currentStake = parseFloat(document.getElementById('stakeAwal').value); 
            lossCount = 0; updateUI(); 
            log("Manual Stake Reset triggered.", 'info');
        }

        function updateUI() {
            const p = document.getElementById('statProfit');
            p.innerText = `$${totalProfit.toFixed(2)}`;
            p.className = `text-xl font-black mono ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
            document.getElementById('statBalance').innerText = `$${accountBalance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('statStreak').innerText = lossCount;
            document.getElementById('statNextStake').innerText = `$${currentStake.toFixed(2)}`;
        }

        function updateBtn(on) {
            const btn = document.getElementById('btnAction');
            btn.innerText = on ? "STOP ENGINE" : "START ENGINE";
            btn.className = on ? btn.className.replace('bg-blue-600', 'bg-red-600') : btn.className.replace('bg-red-600', 'bg-blue-600');
            document.getElementById('dot').className = `w-2 h-2 rounded-full ${on ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`;
            document.getElementById('statusText').innerText = on ? "ENGINE LIVE" : "OFFLINE";
            document.getElementById('statusText').className = `text-[9px] uppercase font-black ${on ? 'text-green-500' : 'text-slate-500'}`;
            document.getElementById('loader').classList.toggle('hidden', !on);
        }

        function log(m, t) {
            const l = document.getElementById('log');
            const d = document.createElement('div');
            d.className = t === 'win' ? 'win' : t === 'loss' ? 'loss' : t === 'info' ? 'info' : 'text-slate-500';
            d.innerHTML = `<span class="opacity-20 mr-2">[${new Date().toLocaleTimeString()}]</span> ${m}`;
            l.prepend(d);
            if(l.children.length > 30) l.lastChild.remove();
        }

        function openAccountModal() { document.getElementById('accountModal').classList.replace('hidden', 'flex'); }
        function closeAccountModal() { document.getElementById('accountModal').classList.replace('flex', 'hidden'); }
        function saveNewAccount() {
            const n = document.getElementById('newAccName').value, t = document.getElementById('newAccToken').value;
            if(!n || !t) return;
            accounts.push({ name: n, token: t });
            localStorage.setItem('hunter_accounts', JSON.stringify(accounts));
            renderAccountList(); closeAccountModal();
        }
    </script>
</body>
</html>
